<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Table</title>
  <style>
    table, th, td{
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Class TimeTable</h1>

  <table border="1" style="border-collapse: collapse; padding: 10px;">
    <tr>
      <th>Days/Time</th>
      <th>7:00am - 10:00am</th>
      <th>10:00am - 12:30pm</th>
      <th >12:30pm - 1:00p</th>
      <th>1:00pm - 3:30pm</th>
      <th>3:30pm - 5:00pm</th>
    </tr>
    <tr>
      <th>Monday</th>
      <td>-</td>
      <td>Chemistry</td>
      <td rowspan="4">Break</td>
      <td>-</td>
      <td>Biology</td>
    </tr>
    <tr>
      <th>Tuseday</th>
      <td>-</td>
      <td>Mathematics</td>
      <!-- <td rowspan="4">Break</td> -->
      <td>English</td>
      <td>-</td>
    </tr>
  </table>

</body>
</html>
