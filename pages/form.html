<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Docs</title>
  </head>
  <body>
    <h1>Form Docs</h1>

    <form action="">
      <div>
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="John Doe" value="" />

        <input type="text" name="" id="">
      </div>

      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="example@gmail.com" />
      </div>

      <div>
        <label for="password">password</label>
        <input name="password" id="password" type="password">
      </div>

      <textarea name="comment" id="comment" rows="10" cols="20"></textarea>

      <select name="country" id="country">
        <option value="ng">Nigeria</option>
        <option value="us">USA</option>
        <option value="fr">france</option>

      </select>


      <fieldset>
        <legend>Personal info</legend>
        <input type="text" id="fname" name="fname" placeholder="John" value="" />
        <input type="text" id="lname" name="lname" placeholder="Doe" value="" />
      </fieldset>





      <button type="submit">Submit</button>
    </form>
  </body>
</html>
